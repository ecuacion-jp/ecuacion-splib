<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
		xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
		layout:decorate="~{bootstrap/page-base-wide}"
		data-show-page-login-state="public">
<head>
	<link th:href="@{/css/splib-web-markdown.css}" rel="stylesheet">
</head>
<body>
	<div layout:fragment="base-content" th:remove="tag">
		<!--/* th:utext: "content" is rendered as raw, unescaped HTML. Safe only because
			MarkdownPageService restricts it to Markdown files bundled on the classpath by the
			application developer, never user-supplied input — see that class's javadoc. */-->
		<div class="markdown-body" th:utext="${content}"></div>
	</div>
</body>
</html>
