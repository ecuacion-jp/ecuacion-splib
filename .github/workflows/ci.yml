name: CI

on:
  push:
    branches:
      - '**'
  pull_request:

env:
  MAVEN_OPTS: -Xmx2g

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          path: ecuacion-splib

      - uses: actions/checkout@v5
        with:
          repository: ecuacion-jp/ecuacion-lib
          path: ecuacion-lib

      - uses: actions/checkout@v5
        with:
          repository: ecuacion-jp/ecuacion-utils
          path: ecuacion-utils

      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build ecuacion-lib
        working-directory: ecuacion-lib
        run: mvn install -DskipTests -q

      - name: Build ecuacion-utils
        working-directory: ecuacion-utils
        run: mvn install -DskipTests -q

      - name: Verify
        working-directory: ecuacion-splib
        run: mvn verify -Dwagon.skip=true

      - name: Upload coverage to Codecov
        if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'pull_request' && github.base_ref == 'main')
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: >-
            ecuacion-splib/ecuacion-splib-core/target/site/jacoco/jacoco.xml,
            ecuacion-splib/ecuacion-splib-jpa/target/site/jacoco/jacoco.xml,
            ecuacion-splib/ecuacion-splib-batch/target/site/jacoco/jacoco.xml,
            ecuacion-splib/ecuacion-splib-web/target/site/jacoco/jacoco.xml,
            ecuacion-splib/ecuacion-splib-web-jpa/target/site/jacoco/jacoco.xml,
            ecuacion-splib/ecuacion-splib-rest/target/site/jacoco/jacoco.xml
          fail_ci_if_error: false
